name: Generate FESTA PDF

# 手動実行（workflow_dispatch）。フェスタCSVと系統マスターCSVのURLを入力する。
on:
  workflow_dispatch:
    inputs:
      festa_csv_url:
        description: "フェスタタブの gviz CSV URL（例: .../gviz/tq?tqx=out:csv&sheet=タブ名）"
        required: true
        type: string
      master_csv_url:
        description: "系統マスタータブの gviz CSV URL"
        required: true
        type: string
      run_tag:
        description: "実行識別タグ（GAS連携が起動したrunを特定するために使用。手動実行では空でOK）"
        required: false
        type: string
        default: ""

# run_tag が指定されていれば run-name に反映し、GAS から display_title で対象 run を特定できるようにする
run-name: "${{ inputs.run_tag != '' && format('PDF: {0}', inputs.run_tag) || 'Generate FESTA PDF (manual)' }}"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Install fonts (@fontsource)
        run: npm install

      - name: Build rendered.html from CSV
        run: |
          python build.py \
            "${{ inputs.festa_csv_url }}" \
            "${{ inputs.master_csv_url }}"

      - name: Render PDF
        run: python make_pdf.py

      - name: Resolve PDF path
        id: meta
        run: |
          PDF=$(ls FESTA_CREW_ENTRY_SHEET_*.pdf | head -n1)
          echo "pdf=$PDF" >> "$GITHUB_OUTPUT"

      # 成果物名は固定（festa-pdf）。GAS は run_id の artifact 一覧から取得するため名前で迷わない。
      # 中身のPDFファイル名は make_pdf.py の version 命名（FESTA_CREW_ENTRY_SHEET_<version>.pdf）を維持。
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: festa-pdf
          path: ${{ steps.meta.outputs.pdf }}
          if-no-files-found: error
